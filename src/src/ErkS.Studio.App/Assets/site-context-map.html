            handleMapClick([event.latlng.lng, event.latlng.lat]);
          }
        });
        map.on('zoomend', () => {
          pullState();
          updatePlanFeatureStyle();
          updateBoundaryStyle();
          renderAnnotations();
        });
        map.whenReady(() => {
          ready = true;
          renderPlanFeatures();
          renderBoundary();
          showMessage('');
          applyInteraction();
          renderAnnotations();
        });
      }

      async function createGoogle(providerId) {
        if (!options.googleApiKey) throw new Error('Google Maps API key тохируулаагүй байна.');
        const key = encodeURIComponent(options.googleApiKey);
        await loadScript(`https://maps.googleapis.com/maps/api/js?key=${key}&loading=async`, 'google-maps-sdk');
        engine = 'google';
        map = new google.maps.Map(host, {
          center: { lat: state.centerLatitude, lng: state.centerLongitude },
          zoom: Math.round(state.zoom),
          heading: state.bearing,
          mapTypeId: providerId === 'GoogleSatellite' ? 'satellite' : 'roadmap',
          disableDefaultUI: true,
          clickableIcons: false,
          keyboardShortcuts: false
        });
        googleProjectionOverlay = new google.maps.OverlayView();
        googleProjectionOverlay.onAdd = () => { };
        googleProjectionOverlay.draw = renderAnnotations;
        googleProjectionOverlay.onRemove = () => { };
        googleProjectionOverlay.setMap(map);
        map.addListener('click', event => {
          if (toolMode !== 'pan' && event.latLng) {
            handleMapClick([event.latLng.lng(), event.latLng.lat()]);
          }
        });
        map.addListener('idle', () => {
          if (!ready) {
            renderPlanFeatures();
            renderBoundary();
          }
          ready = true; pullState(); showMessage(''); renderAnnotations();
        });
        map.addListener('center_changed', () => {
          pullState();
          renderAnnotations();
        });
        map.addListener('zoom_changed', () => {
          pullState();
          updatePlanFeatureStyle();
          updateBoundaryStyle();
          renderAnnotations();
        });
        applyInteraction();
      }

      async function createAzure(providerId) {
        if (!options.azureMapsKey) throw new Error('Azure Maps key тохируулаагүй байна.');
        loadStyle('https://atlas.microsoft.com/sdk/javascript/mapcontrol/3/atlas.min.css');
        await loadScript('https://atlas.microsoft.com/sdk/javascript/mapcontrol/3/atlas.min.js', 'azure-maps-sdk');
        engine = 'azure';
        map = new atlas.Map(host, {
          center: [state.centerLongitude, state.centerLatitude],
          zoom: state.zoom,
          bearing: state.bearing,
          style: providerId === 'AzureAerial' ? 'satellite' : 'road',
          showLogo: true,
          showFeedbackLink: false,
          authOptions: { authType: 'subscriptionKey', subscriptionKey: options.azureMapsKey }
        });
        map.events.add('ready', () => {
          ready = true;
          renderPlanFeatures();
          renderBoundary();
          showMessage('');
          applyInteraction();
          renderAnnotations();
        });
        map.events.add('click', event => {
          if (toolMode !== 'pan' && event && event.position) {
            handleMapClick(event.position);
          }
        });
        map.events.add('move', renderAnnotations);
        map.events.add('moveend', () => {
          pullState();
          updatePlanFeatureStyle();
          updateBoundaryStyle();
          renderAnnotations();
        });
      }

      async function setProvider(providerId) {
        destroyMap();
        state.providerId = providerId || 'OpenStreetMap';
        state.attribution = providerAttribution(state.providerId);
        showMessage('Газрын зураг ачаалж байна...');
        try {
          if (state.providerId === 'OpenStreetMap' || state.providerId === 'OpenTopoMap') {
            await createLeaflet(state.providerId);
          } else if (state.providerId === 'GoogleRoad' || state.providerId === 'GoogleSatellite') {
            await createGoogle(state.providerId);
          } else {
            await createAzure(state.providerId);
          }
        } catch (error) {
          ready = false;
          showMessage(error && error.message ? error.message : 'Газрын зураг ачаалсангүй.');
          throw error;
        }
      }

      async function init(value) {
        options = value || {};
        Object.assign(state, options.viewport || {});
        normalizeAnnotations(options.viewport);
        setBoundary(options.boundary);
        setPlanFeatures(options.planFeatures);
        editing = Boolean(options.editing);
        await setProvider(state.providerId);
        applyInteraction();
        return getState();
      }

      function setEditing(value) {
        editing = Boolean(value);
        applyInteraction();
        renderAnnotations();
      }

      function zoomBy(delta) {
        if (!map || !editing) return;
        if (engine === 'leaflet') map.setZoom(map.getZoom() + delta);
        else if (engine === 'google') map.setZoom((map.getZoom() || state.zoom) + delta);
        else if (engine === 'azure') map.setCamera({ zoom: map.getCamera().zoom + delta, duration: 180 });
        pullState();
      }

      function setState(value) {
        Object.assign(state, value || {});
        if (value && (
          Array.isArray(value.landmarks) ||
          Array.isArray(value.distanceMeasures) ||
          Array.isArray(value.radiusMeasures))) {
          normalizeAnnotations(value);
        }
        capturing = false;
        if (!map) return;
        if (engine === 'leaflet') {
          map.setMaxZoom(leafletInteractiveMaxZoom);
          map.setView(
            [state.centerLatitude, state.centerLongitude],
            Math.min(state.zoom, leafletInteractiveMaxZoom));
        }
        else if (engine === 'google') {
          map.setCenter({ lat: state.centerLatitude, lng: state.centerLongitude });
          map.setZoom(Math.round(state.zoom));
          map.setHeading(state.bearing || 0);
        } else if (engine === 'azure') {
          map.setCamera({ center: [state.centerLongitude, state.centerLatitude], zoom: state.zoom, bearing: state.bearing || 0 });
        }
        updatePlanFeatureStyle();
        updateBoundaryStyle();
        renderAnnotations();
      }

      function resize() {
        if (!map) return;
        if (engine === 'leaflet') map.invalidateSize(false);
        else if (engine === 'google') google.maps.event.trigger(map, 'resize');
        else if (engine === 'azure') map.resize();
        requestAnimationFrame(renderAnnotations);
      }

      function getState() {
        pullState();
        return {
          providerId: state.providerId,
          centerLatitude: state.centerLatitude,
          centerLongitude: state.centerLongitude,
          zoom: state.zoom,
          bearing: state.bearing || 0,
          attribution: state.attribution,
          bounds: currentBounds(),
          ready,
          selectedAnnotationKind,
          selectedAnnotationId,
          selectedDistanceVertexIndex,
          selectedRadiusIndex,
          annotationStatusMessage,
          annotationToolName: String(toolOptions.name || ''),
          ...cloneAnnotations()
        };
      }

      window.erks = {
        init, setProvider, setEditing, setBoundary, setPlanFeatures, zoomBy,
        setState, fitBounds, resize, getState, prepareCapture,
        currentLeafletTilesReady, setTool, finishDrawing,
        updateSelectedAnnotation, deleteSelectedAnnotation, selectAnnotation,
        selectDistanceVertex, selectRadiusRing, addRadius, removeSelectedRadius,
        renderAnnotations
      };
    })();
  </script>
</body>
</html>
